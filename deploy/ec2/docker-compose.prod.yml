services:
  aura-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: aura-api:latest
    container_name: aura-api
    restart: unless-stopped
    env_file:
      - ../../.env.production
    ports:
      - "80:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
